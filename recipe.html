<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתכון</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="recipe-container">
        <a href="recipes.html" class="back-link">← חזרה למתכונים</a>
        
        <div class="recipe-content">
            <h1 id="recipeTitle"></h1>
            
            <div class="reading-controls">
                <button class="btn" id="startReadingBtn">🎙️ התחל קריאה</button>
                <button class="btn btn-stop" id="stopReadingBtn" disabled>⏹️ עצור קריאה</button>
                <button class="btn" id="editRecipeBtn">✏️ ערוך מתכון</button>
            </div>
            
            <div id="editModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <span class="close" id="closeModal">&times;</span>
                    <h2>✏️ עריכת מתכון</h2>
                    <form id="editRecipeForm">
                        <div class="form-group">
                            <label for="editName">שם המתכון</label>
                            <input type="text" id="editName" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="editIngredients">מרכיבים (אחד בכל שורה)</label>
                            <textarea id="editIngredients" rows="6" required></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="editSteps">שלבי הכנה (אחד בכל שורה)</label>
                            <textarea id="editSteps" rows="8" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn">💾 שמור שינויים</button>
                    </form>
                </div>
            </div>
            
            <div class="recipe-section">
                <h2>🥘 מרכיבים</h2>
                <ul id="ingredientsList"></ul>
            </div>
            
            <div class="recipe-section">
                <h2>👨‍🍳 שלבי הכנה</h2>
                <ol id="stepsList"></ol>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reader.js"></script>
</body>
</html>
