<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגדרות</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="settings-container">
        <a href="recipes.html" class="back-link">← חזרה למתכונים</a>
        
        <div class="settings-content">
            <h1>⚙️ הגדרות</h1>
            
            <form id="settingsForm">
                <div class="setting-group">
                    <label for="stepDelay">⏱️ השהיה בין שלבים (שניות)</label>
                    <input type="number" id="stepDelay" min="1" max="30" value="3" required>
                </div>
                
                <div class="setting-group">
                    <label for="theme">🎨 עיצוב נושא</label>
                    <select id="theme">
                        <option value="light">☀️ בהיר</option>
                        <option value="dark">🌙 כהה</option>
                    </select>
                </div>
                
                <div class="setting-group">
                    <label for="voiceGender">🎤 סוג קול</label>
                    <select id="voiceGender">
                        <option value="male">👨 קול גברי</option>
                        <option value="female">👩 קול נשי</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" style="width: 100%;">💾 שמור הגדרות</button>
            </form>
            
            <div id="saveMessage" class="save-message"></div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
