<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - מתכונים</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h1 id="formTitle">🍳 התחברות למתכונים</h1>
        
        <!-- Login Form -->
        <form id="loginForm">
            <input type="text" id="username" placeholder="👤 שם משתמש" required>
            <input type="password" id="password" placeholder="🔒 סיסמה" required>
            <button type="submit">🚀 התחבר</button>
            <div id="error" class="error"></div>
        </form>
        
        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" style="display: none;">
            <input type="text" id="regUsername" placeholder="👤 שם משתמש (לפחות 3 תווים)" required minlength="3">
            <input type="password" id="regPassword" placeholder="🔒 סיסמה (לפחות 4 תווים)" required minlength="4">
            <input type="password" id="regPasswordConfirm" placeholder="🔒 אימות סיסמה" required>
            <button type="submit">✅ הירשם</button>
            <div id="regError" class="error"></div>
        </form>
        
        <!-- Toggle Button -->
        <div style="text-align: center; margin-top: 20px;">
            <button type="button" id="toggleBtn" class="toggle-btn" style="padding: 10px 20px; background: var(--border-color); border-radius: 8px; font-size: 15px;">אין לך חשבון? הירשם עכשיו</button>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
